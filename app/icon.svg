<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient (Royal Navy Blue) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <!-- Crown & Accent Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
  </defs>

  <!-- Squircle Base for smooth modern branding -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Subtle Elegant Outer Gold Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#goldGrad)" stroke-width="10" opacity="0.25" />

  <!-- Logo Emblem -->
  <g transform="translate(0, -12)">
    <!-- Elegant Crown representing "Tủ Nhựa Giá Rẻ" (Royal) -->
    <path d="M176 190 L216 230 L256 160 L296 230 L336 190 L320 250 L192 250 Z" fill="url(#goldGrad)" />
    <circle cx="256" cy="144" r="14" fill="url(#goldGrad)" />
    <circle cx="176" cy="174" r="10" fill="url(#goldGrad)" />
    <circle cx="336" cy="174" r="10" fill="url(#goldGrad)" />

    <!-- Stylized House silhouette representing "Nội Thất" (Furniture / Interior) -->
    <path d="M138 290 L256 190 L374 290 L346 290 L346 400 L166 400 L166 290 Z" fill="#ffffff" />
    
    <!-- Elegant interior negative-space cutting out an armchair silhouette -->
    <path d="M216 310 L296 310 L296 348 L270 348 L270 380 L242 380 L242 348 L216 348 Z" fill="url(#bgGrad)" />
  </g>
</svg>
